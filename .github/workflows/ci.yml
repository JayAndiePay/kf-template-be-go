name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
          cache: true

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files (run 'gofmt -w .'):"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          mkdir -p TestResults
          go test -race -count=1 -v ./... 2>&1 | tee TestResults/results.txt; exit ${PIPESTATUS[0]}
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-results
          path: TestResults/

      - name: Check pending migrations
        run: bash .github/scripts/check-pending-migrations.sh

      # Docker build only runs if all prior steps pass — tests are a hard gate
      - name: Docker build
        run: docker build -t [project-name]:ci .
